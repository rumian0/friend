<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="https://mingcy.cn/image/mcy.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>Links Status</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #202124;
            --muted: #70757a;
            --line: #e8eaed;
            --soft: #f8f9fa;
            --ok: #188038;
            --fail: #b3261e;
            --menu-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
        }

        html[data-theme="dark"] {
            --bg: #111111;
            --text: #eeeeee;
            --muted: #9aa0a6;
            --line: #2a2a2a;
            --soft: #181818;
            --ok: #81c995;
            --fail: #f28b82;
            --menu-shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.7;
        }

        body {
            transition: background 0.2s ease, color 0.2s ease;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        a:hover {
            color: var(--muted);
        }

        .container {
            width: min(1200px, calc(100% - 40px));
            margin: 0 auto;
        }

        .nav {
            border-bottom: 1px solid var(--line);
            background: color-mix(in srgb, var(--bg) 92%, transparent);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .nav-inner {
            height: 62px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 24px;
        }

        .brand {
            display: inline-flex;
            align-items: center;
            gap: 9px;
            font-size: 15px;
            font-weight: 600;
        }

        .brand img {
            width: 24px;
            height: 24px;
            border-radius: 50%;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 18px;
            color: var(--muted);
            font-size: 14px;
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .menu-toggle {
            display: none;
            width: 32px;
            height: 32px;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 4px;
            border: 1px solid var(--line);
            border-radius: 50%;
            background: var(--bg);
            color: var(--muted);
            cursor: pointer;
            padding: 0;
        }

        .menu-toggle span {
            width: 14px;
            height: 1px;
            background: currentColor;
            transition: transform 0.2s ease, opacity 0.2s ease;
        }

        .nav.menu-open .menu-toggle span:nth-child(1) {
            transform: translateY(5px) rotate(45deg);
        }

        .nav.menu-open .menu-toggle span:nth-child(2) {
            opacity: 0;
        }

        .nav.menu-open .menu-toggle span:nth-child(3) {
            transform: translateY(-5px) rotate(-45deg);
        }

        .nav-icon {
            width: 32px;
            height: 32px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--line);
            border-radius: 50%;
            background: var(--bg);
            color: var(--muted);
            cursor: pointer;
            padding: 0;
        }

        .nav-icon:hover {
            color: var(--text);
            background: var(--soft);
        }

        .hero {
            padding: 58px 0 30px;
            border-bottom: 1px solid var(--line);
        }

        .hero h1 {
            margin: 0;
            font-size: clamp(30px, 5vw, 46px);
            line-height: 1.18;
            letter-spacing: -0.04em;
            font-weight: 680;
        }

        .hero p {
            max-width: 620px;
            margin: 14px 0 0;
            color: var(--muted);
            font-size: 15px;
        }

        .summary {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0;
            border-bottom: 1px solid var(--line);
        }

        .summary-item {
            padding: 22px 18px 20px 0;
        }

        .summary-item + .summary-item {
            padding-left: 18px;
            border-left: 1px solid var(--line);
        }

        .summary-value {
            font-size: 24px;
            line-height: 1;
            font-weight: 650;
            letter-spacing: -0.03em;
        }

        .summary-label {
            margin-top: 8px;
            color: var(--muted);
            font-size: 13px;
        }

        .section {
            padding: 34px 0;
            border-bottom: 1px solid var(--line);
        }

        .section-title {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 18px;
            margin-bottom: 16px;
        }

        .section-title h2 {
            margin: 0;
            font-size: 20px;
            line-height: 1.3;
            letter-spacing: -0.03em;
        }

        .section-title span {
            color: var(--muted);
            font-size: 13px;
            white-space: nowrap;
        }

        .article-list {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 14px;
        }

        .article-item {
            min-width: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 16px;
            min-height: 128px;
            padding: 16px;
            border: 1px solid var(--line);
            border-radius: 12px;
            background: var(--bg);
        }

        .article-item:hover {
            background: var(--soft);
        }

        .article-title {
            margin: 0;
            font-size: 16px;
            line-height: 1.55;
            font-weight: 560;
        }

        .article-meta {
            margin-top: 4px;
            display: flex;
            gap: 10px;
            color: var(--muted);
            font-size: 13px;
        }

        .article-date {
            color: var(--muted);
            font-size: 13px;
            white-space: nowrap;
            padding-top: 2px;
        }

        .article-item:hover .article-title {
            color: var(--muted);
        }

        .load-more {
            margin-top: 18px;
        }

        .load-more button {
            height: 36px;
            padding: 0 14px;
            border: 1px solid var(--line);
            border-radius: 18px;
            background: var(--bg);
            color: var(--text);
            cursor: pointer;
        }

        .load-more button:hover {
            background: var(--soft);
        }

        .status-head {
            display: flex;
            justify-content: space-between;
            gap: 18px;
            color: var(--muted);
            font-size: 13px;
            margin-bottom: 12px;
        }

        .status-head .ok {
            color: var(--ok);
        }

        .status-head .fail {
            color: var(--fail);
        }

        .links-list {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 10px;
        }

        .link-item {
            min-width: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 10px 12px;
            border: 1px solid var(--line);
            border-radius: 10px;
            font-size: 14px;
        }

        .link-name {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .link-state {
            flex: 0 0 auto;
            color: var(--muted);
            font-size: 12px;
        }

        .link-state.ok {
            color: var(--ok);
        }

        .link-state.fail {
            color: var(--fail);
        }

        .empty {
            padding: 20px 0;
            color: var(--muted);
            font-size: 14px;
        }

        .footer {
            padding: 28px 0 34px;
            color: var(--muted);
            font-size: 13px;
            text-align: center;
        }

        .footer-inner {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .footer-meta {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        ::view-transition-old(root),
        ::view-transition-new(root) {
            animation: none;
            mix-blend-mode: normal;
        }

        ::view-transition-new(root) {
            clip-path: circle(0 at var(--x) var(--y));
            animation: reveal 0.45s ease-out forwards;
        }

        @keyframes reveal {
            to {
                clip-path: circle(var(--r) at var(--x) var(--y));
            }
        }

        @media (max-width: 720px) {
            .container {
                width: min(100% - 28px, 1200px);
            }

            .nav-inner {
                min-height: 58px;
                padding: 12px 0;
                align-items: center;
                gap: 10px;
                flex-wrap: wrap;
            }

            .menu-toggle {
                display: inline-flex;
            }

            .nav-links {
                order: 3;
                width: 100%;
                display: none;
                flex-direction: column;
                align-items: stretch;
                gap: 0;
                padding: 8px 12px;
                border: 1px solid var(--line);
                border-radius: 12px;
                background: var(--bg);
                box-shadow: var(--menu-shadow);
            }

            .nav.menu-open .nav-links {
                display: flex;
            }

            .nav-links a {
                padding: 9px 0;
            }

            .nav-actions {
                margin-left: auto;
            }

            .hero {
                padding-top: 38px;
            }

            .summary {
                grid-template-columns: repeat(2, 1fr);
            }

            .summary-item:nth-child(3) {
                border-left: 0;
            }

            .summary-item:nth-child(n + 3) {
                border-top: 1px solid var(--line);
            }

            .article-list,
            .links-list {
                grid-template-columns: 1fr;
            }

            .article-item {
                gap: 8px;
                min-height: auto;
            }

            .article-date {
                padding-top: 0;
            }

            .footer-inner {
                flex-direction: column;
            }

            .footer-meta {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="container nav-inner">
            <a class="brand" href="./">
                <img src="./favicon.ico" alt="Logo">
                <span>Links Status</span>
            </a>
            <div class="nav-links" id="nav-links">
                <a href="https://www.mingcy.cn">主页</a>
                <a href="https://mingcy.cn" target="_blank" rel="noopener">博客</a>
            </div>
            <div class="nav-actions">
                <button id="theme-toggle" class="nav-icon" title="切换主题" data-bound="1">
                    <svg id="sun-icon" viewBox="0 0 24 24" width="18" height="18" fill="currentColor" style="display: none;">
                        <circle cx="12" cy="12" r="5"></circle>
                        <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
                    </svg>
                    <svg id="moon-icon" viewBox="0 0 24 24" width="18" height="18" fill="currentColor" style="display: block;">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
                    </svg>
                </button>
                <button id="menu-toggle" class="menu-toggle" type="button" aria-label="打开菜单" aria-controls="nav-links" aria-expanded="false">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>
        </div>
    </nav>

    <main class="container">
        <section class="hero">
            <h1>茗辰原朋友圈及友链监控</h1>
            <p>聚合友链文章，记录站点可访问状态。无多余装饰，只保留必要信息。</p>
        </section>

        <section class="summary">
            <div class="summary-item">
                <div class="summary-value" id="stat-friends">-</div>
                <div class="summary-label">友链</div>
            </div>
            <div class="summary-item">
                <div class="summary-value" id="stat-articles">-</div>
                <div class="summary-label">文章</div>
            </div>
            <div class="summary-item">
                <div class="summary-value" id="stat-active">-</div>
                <div class="summary-label">活跃</div>
            </div>
            <div class="summary-item">
                <div class="summary-value" id="stat-ok">-</div>
                <div class="summary-label">正常</div>
            </div>
        </section>

        <section class="section">
            <div class="section-title">
                <h2>最新文章</h2>
                <span id="update-time">-</span>
            </div>
            <div class="article-list" id="articles">
                <div class="empty">加载中...</div>
            </div>
            <div class="load-more" id="load-more" style="display: none;">
                <button type="button" onclick="loadMore()">加载更多</button>
            </div>
        </section>

        <section class="section">
            <div class="section-title">
                <h2>友链状态</h2>
                <span id="links-summary">加载中...</span>
            </div>
            <div class="links-list" id="links-list"></div>
        </section>
    </main>

    <footer class="footer">
        <div class="container footer-inner">
            <div class="footer-meta">
                <span>Powered by <a href="https://mingcy.cn" target="_blank" rel="noopener">茗辰原</a></span>
            </div>
        </div>
    </footer>

    <script>
        let allArticles = [];
        let displayedCount = 0;
        const pageSize = 12;
        const root = document.documentElement;
        const nav = document.querySelector('.nav');
        const themeToggle = document.getElementById('theme-toggle');
        const menuToggle = document.getElementById('menu-toggle');
        const sunIcon = document.getElementById('sun-icon');
        const moonIcon = document.getElementById('moon-icon');

        function getPreferredTheme() {
            const saved = localStorage.getItem('theme');
            if (saved) return saved;
            return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }

        function applyTheme(theme) {
            root.dataset.theme = theme;
            localStorage.setItem('theme', theme);
            sunIcon.style.display = theme === 'dark' ? 'block' : 'none';
            moonIcon.style.display = theme === 'dark' ? 'none' : 'block';
        }

        function toggleTheme(event) {
            const nextTheme = root.dataset.theme === 'dark' ? 'light' : 'dark';
            const x = event.clientX;
            const y = event.clientY;
            const radius = Math.hypot(Math.max(x, innerWidth - x), Math.max(y, innerHeight - y));
            root.style.setProperty('--x', `${x}px`);
            root.style.setProperty('--y', `${y}px`);
            root.style.setProperty('--r', `${radius}px`);

            if (!document.startViewTransition) {
                applyTheme(nextTheme);
                return;
            }

            document.startViewTransition(() => applyTheme(nextTheme));
        }

        function toggleMenu() {
            const isOpen = nav.classList.toggle('menu-open');
            menuToggle.setAttribute('aria-expanded', String(isOpen));
            menuToggle.setAttribute('aria-label', isOpen ? '关闭菜单' : '打开菜单');
        }

        async function fetchData() {
            try {
                const [allRes, statusRes] = await Promise.all([
                    fetch('./all.json'),
                    fetch('./status.json')
                ]);

                const allData = await allRes.json();
                const statusData = await statusRes.json();
                updateStats(allData, statusData);
                allArticles = allData.article_data || [];
                displayArticles();
                displayLinksStatus(statusData);
            } catch (error) {
                document.getElementById('articles').innerHTML = '<div class="empty">数据加载失败</div>';
                document.getElementById('links-summary').textContent = '暂无数据';
            }
        }

        function updateStats(allData, statusData) {
            const stats = allData.statistical_data || {};
            const links = statusData.link_status || [];
            const okCount = links.filter(item => item.success).length;
            const totalCount = links.length;

            document.getElementById('stat-friends').textContent = stats.friends_num || totalCount || 0;
            document.getElementById('stat-articles').textContent = stats.article_num || 0;
            document.getElementById('stat-active').textContent = stats.active_num || 0;
            document.getElementById('stat-ok').textContent = `${okCount}/${totalCount}`;
            document.getElementById('update-time').textContent = stats.last_updated_time || statusData.timestamp || '-';
        }

        function displayArticles() {
            const container = document.getElementById('articles');
            const toShow = allArticles.slice(displayedCount, displayedCount + pageSize);

            if (displayedCount === 0) {
                container.innerHTML = '';
            }

            if (allArticles.length === 0) {
                container.innerHTML = '<div class="empty">暂无文章</div>';
                document.getElementById('load-more').style.display = 'none';
                return;
            }

            toShow.forEach(article => {
                const item = document.createElement('a');
                item.className = 'article-item';
                item.href = article.link || '#';
                item.target = '_blank';
                item.rel = 'noopener';
                item.innerHTML = `
                    <div>
                        <h3 class="article-title">${escapeHtml(article.title)}</h3>
                        <div class="article-meta">
                            <span>${escapeHtml(article.author)}</span>
                        </div>
                    </div>
                    <time class="article-date">${article.created ? article.created.substring(0, 10) : ''}</time>
                `;
                container.appendChild(item);
            });

            displayedCount += toShow.length;
            document.getElementById('load-more').style.display = displayedCount < allArticles.length ? 'block' : 'none';
        }

        function loadMore() {
            displayArticles();
        }

        function displayLinksStatus(statusData) {
            const list = document.getElementById('links-list');
            const summary = document.getElementById('links-summary');
            const links = statusData.link_status || [];

            if (links.length === 0) {
                list.innerHTML = '<div class="empty">暂无检测数据</div>';
                summary.textContent = '暂无数据';
                return;
            }

            const okCount = links.filter(item => item.success).length;
            const failCount = links.length - okCount;
            summary.innerHTML = `<span class="ok">${okCount} 正常</span> · <span class="fail">${failCount} 异常</span>`;
            list.innerHTML = links.map(item => `
                <a class="link-item" href="${escapeAttribute(item.link)}" target="_blank" rel="noopener" title="${escapeAttribute(item.name)}">
                    <span class="link-name">${escapeHtml(item.name)}</span>
                    <span class="link-state ${item.success ? 'ok' : 'fail'}">${item.success ? '正常' : '异常'}</span>
                </a>
            `).join('');
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function escapeAttribute(text) {
            return escapeHtml(text).replace(/"/g, '&quot;');
        }

        applyTheme(getPreferredTheme());
        themeToggle.addEventListener('click', toggleTheme);
        menuToggle.addEventListener('click', toggleMenu);
        document.querySelectorAll('.nav-links a').forEach(link => {
            link.addEventListener('click', () => {
                nav.classList.remove('menu-open');
                menuToggle.setAttribute('aria-expanded', 'false');
                menuToggle.setAttribute('aria-label', '打开菜单');
            });
        });
        fetchData();
    </script>
</body>
</html>
