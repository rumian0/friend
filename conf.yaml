# 爬虫相关配置
# 解释：使用request实现友链文章爬取，并放置到根目录的all.json下
#   enable:             是否启用爬虫
#   json_url:           请填写对应格式json的地址，仅支持网络地址
#   article_count:      请填写每个博客需要获取的最大文章数量
spider_settings:
  enable: true
  json_url: "https://mingcy.cn/js/friend.json"
  article_count: 5

# 特殊RSS地址指定，可以置空但是不要删除！
# 解释：用于指定特殊RSS地址，如B站专栏等不常见RSS地址后缀，可以添加多个
#   name:               友链名称
#   url:                指定的RSS地址
specific_RSS:
  # - name: "故事的程序猿"
  #   url: "https://blog.lichenghao.cn/article/rss.xml"
  # - name: "無名小栈"
  #   url: "https://blog.imsyy.top/rss.xml"

# 友链状态检测配置
# 解释：用于检测友链的可访问性，生成status.json文件
#   enable:             是否启用友链状态检测功能
#   timeout:            单个链接检测超时时间（秒）
#   max_attempts:       直接访问最大重试次数
#   retry_delay:        重试间隔（毫秒）
#   batch_size:         并发批次大小
#   batch_delay:        批次间延迟（毫秒）
#   success_status_min: 成功状态码范围（最小值）
#   success_status_max: 成功状态码范围（最大值）
#   use_backup_api:     是否启用备用API作为备用检测
#   backup_api_urls:    备用API地址列表
#   ssl_verify:         是否验证SSL证书（False可解决证书验证失败问题）
link_status:
  enable: true
  timeout: 30
  max_attempts: 3
  retry_delay: 1000
  batch_size: 10
  batch_delay: 200
  success_status_min: 200
  success_status_max: 399
  use_backup_api: true
  backup_api_urls:
    - "https://v1.nsuuu.com/api/netCheck"
    - "https://v1.nsuuu.com/api/status"
  ssl_verify: False
